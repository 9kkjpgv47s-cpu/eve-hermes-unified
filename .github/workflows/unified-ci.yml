name: unified-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install
        run: npm install

      - name: Typecheck
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Failure-injection matrix (post-build)
        run: npm run validate:failure-injection

      - name: Soak matrix (memory + file) and SLO gates
        run: npm run validate:soak-matrix
        env:
          SOAK_MATRIX_ITERATIONS: "10"
          UNIFIED_SOAK_MIN_SUCCESS_RATE: "0.99"
          UNIFIED_SOAK_MAX_WALL_MS: "120000"
          UNIFIED_SOAK_MAX_P95_WALL_MS: "60000"
          UNIFIED_SOAK_MAX_P95_LANE_MS: "60000"

      - name: Gateway smoke and evidence transcript
        run: bash ./scripts/ci-record-dispatch-evidence.sh

      - name: Upload evidence artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unified-dispatch-evidence
          path: evidence/
