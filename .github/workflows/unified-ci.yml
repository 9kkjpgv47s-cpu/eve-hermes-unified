name: unified-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install
        run: npm install

      - name: Typecheck
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Failure-injection matrix (post-build)
        run: npm run validate:failure-injection

      - name: Soak simulation and metrics bundle
        run: npm run validate:soak -- 12

      - name: Gateway smoke and evidence transcript
        run: bash ./scripts/ci-record-dispatch-evidence.sh

      - name: Upload evidence artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unified-dispatch-evidence
          path: evidence/
