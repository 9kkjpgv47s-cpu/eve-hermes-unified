name: unified-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install
        run: npm install

      - name: Prepare workspace dirs
        run: mkdir -p evidence

      - name: Typecheck
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Unified adapter entrypoints gate
        run: npm run validate:unified-entrypoints

      - name: H5 tenant isolation and region failover gates
        run: npm run validate:tenant-isolation && npm run rehearse:region-failover

      - name: H6 sustainment assurance bundle
        run: npm run run:h6-assurance-bundle

      - name: H12 sustainment assurance bundle (dispatch queue replay limit + H11 gates)
        run: npm run run:h12-assurance-bundle

      - name: Post-H12 sustainment loop (horizon + closeout gate)
        run: npm run verify:sustainment-loop

      - name: Validate post-H12 sustainment manifest
        run: npm run validate:post-h12-sustainment-manifest

      - name: Build
        run: npm run build

      - name: Full validation chain
        env:
          UNIFIED_ROUTER_DEFAULT_PRIMARY: hermes
          UNIFIED_ROUTER_DEFAULT_FALLBACK: none
          UNIFIED_ROUTER_FAIL_CLOSED: "1"
          UNIFIED_ROUTER_CUTOVER_STAGE: full
          UNIFIED_MEMORY_STORE_KIND: file
          UNIFIED_MEMORY_FILE_PATH: /tmp/eve-hermes-unified-memory.json
          EVE_TASK_DISPATCH_SCRIPT: /bin/true
          EVE_DISPATCH_RESULT_PATH: /tmp/eve-dispatch.json
          HERMES_LAUNCH_COMMAND: /bin/true
          HERMES_LAUNCH_ARGS: ""
        run: npm run validate:all

      - name: Release readiness
        env:
          UNIFIED_RELEASE_READINESS_RUN_VALIDATE_ALL: "0"
          UNIFIED_RELEASE_READINESS_SKIP_TEST: "1"
          UNIFIED_RELEASE_READINESS_EVIDENCE_MIN_SUCCESS_RATE: "0.95"
          UNIFIED_RELEASE_READINESS_EVIDENCE_MAX_P95_LATENCY_MS: "2500"
          UNIFIED_RELEASE_READINESS_EVIDENCE_REQUIRE_FAILURE_SCENARIOS: "1"
          UNIFIED_ROUTER_DEFAULT_PRIMARY: hermes
          UNIFIED_ROUTER_DEFAULT_FALLBACK: none
          UNIFIED_ROUTER_FAIL_CLOSED: "1"
          UNIFIED_ROUTER_CUTOVER_STAGE: full
          UNIFIED_MEMORY_STORE_KIND: file
          UNIFIED_MEMORY_FILE_PATH: /tmp/eve-hermes-unified-memory.json
          EVE_TASK_DISPATCH_SCRIPT: /bin/true
          EVE_DISPATCH_RESULT_PATH: /tmp/eve-dispatch.json
          HERMES_LAUNCH_COMMAND: /bin/true
          HERMES_LAUNCH_ARGS: ""
        run: npm run validate:release-readiness

      - name: Initial scope gate
        run: npm run validate:initial-scope

      - name: Merge bundle validation
        env:
          UNIFIED_MERGE_BUNDLE_RUN_RELEASE_READINESS: "0"
          UNIFIED_MERGE_BUNDLE_RUN_INITIAL_SCOPE: "0"
        run: npm run validate:merge-bundle

      - name: Validate manifest schemas
        run: npm run validate:manifest-schemas

      - name: Verify merge bundle package
        run: npm run verify:merge-bundle

      - name: Stage promotion readiness gate
        run: npm run check:stage-promotion-readiness -- --target-stage canary --allow-horizon-mismatch

      - name: Validate horizon status metadata
        run: npm run validate:horizon-status

      - name: Upload evidence artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unified-evidence
          path: evidence/**
          if-no-files-found: error
